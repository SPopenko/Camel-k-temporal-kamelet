camel.main.routes-include-pattern=camel/temporal-http-routes.yaml

# Temporal connection settings
# Override via system properties (-Dtemporal.host=...) or env vars (TEMPORAL_HOST=...)
temporal.host={{env:TEMPORAL_HOST:localhost}}
temporal.port={{env:TEMPORAL_PORT:7233}}
temporal.namespace={{env:TEMPORAL_NAMESPACE:default}}
temporal.taskQueue={{env:TEMPORAL_TASK_QUEUE:greetings}}
