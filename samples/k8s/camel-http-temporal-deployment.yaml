apiVersion: apps/v1
kind: Deployment
metadata:
  name: camel-http-temporal
  namespace: camel-temporal-sample
spec:
  replicas: 1
  selector:
    matchLabels:
      app: camel-http-temporal
  template:
    metadata:
      labels:
        app: camel-http-temporal
    spec:
      containers:
        - name: camel-http
          image: camel-temporal-sample/camel-http-temporal:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: TEMPORAL_HOST
              value: "temporal-frontend.camel-temporal-sample.svc.cluster.local"
            - name: TEMPORAL_PORT
              value: "7233"
            - name: TEMPORAL_NAMESPACE
              value: default
            - name: TEMPORAL_TASK_QUEUE
              value: greetings
          readinessProbe:
            httpGet:
              path: /workflow/start
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: camel-http-temporal
  namespace: camel-temporal-sample
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app: camel-http-temporal
